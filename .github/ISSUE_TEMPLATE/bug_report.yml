name: Bug report
description: Something is broken
labels: [bug]

body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: input
    id: version
    attributes:
      label: djforge version
      placeholder: "e.g. 0.1.0  (run: djforge version)"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      render: shell
      placeholder: djforge new myapp --preset api
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour / error
      render: shell
    validations:
      required: true
