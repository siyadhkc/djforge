name: Feature request
description: Suggest a new preset, option, or improvement
labels: [enhancement]

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New preset
        - New stack option (database / cache / auth / frontend)
        - CLI / TUI improvement
        - Generated project quality
        - Docs
        - Other
    validations:
      required: true
