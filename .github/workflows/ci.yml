name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check djforge/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=djforge --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ── smoke test: actually generate a project and verify it runs ─────────────
  smoke:
    name: Smoke test — generate + check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install djforge
        run: pip install -e .

      - name: Check installed CLI entry point
        run: djforge --help

      - name: Generate project (--yes, all defaults)
        run: djforge new smoketest --yes --no-git

      - name: Install generated project deps
        run: |
          cd smoketest
          pip install -r requirements.txt

      - name: Check manage.py
        run: |
          cd smoketest
          python manage.py check

      - name: Run generated project tests
        run: |
          cd smoketest
          pytest -x -q

  # ── verify presets all generate without error ─────────────────────────────
  presets:
    name: Preset — ${{ matrix.preset }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        preset: [minimal, api, fullstack]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Generate with preset
        run: djforge new testproj --yes --preset ${{ matrix.preset }} --no-git
      - name: Verify structure
        run: |
          test -f testproj/manage.py
          test -f testproj/requirements.txt
          test -f testproj/testproj/settings.py
          test -f testproj/testproj/core/views.py
          if [ "${{ matrix.preset }}" = "fullstack" ]; then test -f testproj/Dockerfile; fi
